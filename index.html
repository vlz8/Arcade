<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Collection</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <p class="hero-badge">Local arcade</p>
        <h1>Game Collection</h1>
        <p class="subtitle">Pick a game and play — everything runs in your browser, no install needed.</p>

        <div class="game-menu">
            <a href="index_triki.html" class="game-card">
                <div class="game-icon">⭕✖️</div>
                <h3>Tic Tac Toe</h3>
                <p class="game-description">Classic X vs O game</p>
            </a>

            <a href="index_snake.html" class="game-card">
                <div class="game-icon">🐍</div>
                <h3>Snake Game</h3>
                <p class="game-description">Eat food and grow without hitting walls</p>
            </a>

            <a href="index_tetris.html" class="game-card">
                <div class="game-icon">🧱</div>
                <h3>Tetris</h3>
                <p class="game-description">Fit falling blocks to clear lines</p>
            </a>

        <footer class="footer">
            <p>Built with HTML, CSS & JavaScript</p>
        </footer>
    </main>
</body>
</html>

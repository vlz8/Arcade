<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids</title>
    <link rel="stylesheet" href="style_asteroids.css">
</head>
<body>
    <div class="container">
        <h1>Asteroids</h1>
        <div class="game-info">
            <div>Score: <span id="score">0</span></div>
            <div>High Score: <span id="highscore">0</span></div>
            <div>Lives: <span id="lives">3</span></div>
            <div>Level: <span id="level">1</span></div>
        </div>
        <div class="game-container">
            <canvas id="game-canvas" width="640" height="480"></canvas>
        </div>
        <div class="game-status" id="game-status">← → rotate · ↑ thrust · </div>
        <div class="controls">
            <button type="button" id="reset-btn">New game</button>
            <button type="button" id="home-btn">Home</button>
        </div>
    </div>
    <script src="script_asteroids.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong</title>
    <link rel="stylesheet" href="style_pong.css">
</head>
<body>
    <div class="container">
        <h1>Pong</h1>
        <div class="game-info">
            <div>You: <span id="score-left">0</span></div>
            <div>CPU: <span id="score-right">0</span></div>
        </div>
        <div class="game-container">
            <canvas id="game-canvas" width="560" height="360"></canvas>
        </div>
        <div class="game-status" id="game-status">W / S or ↑ / ↓ — first to 7 wins</div>
        <div class="controls">
            <button type="button" id="reset-btn">Reset</button>
            <button type="button" id="home-btn">Home</button>
        </div>
    </div>
    <script src="script_pong.js"></script>
</body>
</html>

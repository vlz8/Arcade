<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floppy Disc</title>
    <link rel="stylesheet" href="style_flappy.css">
</head>
<body>
    <div class="container">
        <h1>Floppy Disc</h1>
        <p class="tagline">Classic flap — you’re a 💾</p>
        <div class="game-info">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="best">Best: <span id="best">0</span></div>
        </div>
        <div class="game-container">
            <canvas id="game-canvas" width="320" height="480"></canvas>
        </div>
        <div class="game-status" id="game-status">Click, tap, or Space to flap — avoid the pillars</div>
        <div class="controls">
            <button type="button" id="reset-btn">Reset</button>
            <button type="button" id="home-btn">Home</button>
        </div>
    </div>
    <script src="script_flappy.js"></script>
</body>
</html>

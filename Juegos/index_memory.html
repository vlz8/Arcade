<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
    <link rel="stylesheet" href="style_memory.css">
</head>
<body>
    <div class="container">
        <h1>Memory</h1>
        <div class="game-info">
            <div>Moves: <span id="moves">0</span></div>
            <div>Pairs: <span id="pairs">0</span> / 8</div>
        </div>
        <div class="memory-grid" id="memory-grid"></div>
        <div class="game-status" id="game-status">Find all matching pairs</div>
        <div class="controls">
            <button type="button" id="reset-btn">New game</button>
            <button type="button" id="home-btn">Home</button>
        </div>
    </div>
    <script src="script_memory.js"></script>
</body>
</html>

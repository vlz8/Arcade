<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <link rel="stylesheet" href="style_simon.css">
</head>
<body>
    <div class="container">
        <h1>Simon Says</h1>
        <div class="game-info">
            <div>Level: <span id="level">0</span></div>
            <div>Best: <span id="best">0</span></div>
        </div>
        <div class="simon-board" id="simon-board">
            <button type="button" class="simon-btn green" data-color="0" aria-label="Green"></button>
            <button type="button" class="simon-btn red" data-color="1" aria-label="Red"></button>
            <button type="button" class="simon-btn yellow" data-color="2" aria-label="Yellow"></button>
            <button type="button" class="simon-btn blue" data-color="3" aria-label="Blue"></button>
            <div class="simon-center">
                <button type="button" id="start-btn">Start</button>
            </div>
        </div>
        <div class="game-status" id="game-status">Press Start — watch the sequence, then repeat</div>
        <div class="controls">
            <button type="button" id="reset-btn">Reset</button>
            <button type="button" id="home-btn">Home</button>
        </div>
    </div>
    <script src="script_simon.js"></script>
</body>
</html>

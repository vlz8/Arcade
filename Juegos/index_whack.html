<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whack-a-Mole</title>
    <link rel="stylesheet" href="style_whack.css">
</head>
<body>
    <div class="container">
        <h1>Whack-a-Mole</h1>
        <div class="game-info">
            <div>Score: <span id="score">0</span></div>
            <div>Time: <span id="time">30</span>s</div>
        </div>
        <div class="mole-grid" id="mole-grid"></div>
        <div class="game-status" id="game-status">Press Start — tap moles for +10 points</div>
        <div class="controls">
            <button type="button" id="start-btn">Start</button>
            <button type="button" id="reset-btn">Reset</button>
            <button type="button" id="home-btn">Home</button>
        </div>
    </div>
    <script src="script_whack.js"></script>
</body>
</html>

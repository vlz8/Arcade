<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Game</title>
    <link rel="stylesheet" href="style_tetris.css">
</head>
<body>
    <div class="container">
        <h1>Tetris</h1>
        <div class="game-info">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="lines">Lines: <span id="lines">0</span></div>
            <div class="high-score">High: <span id="high-score">0</span></div>
        </div>
        <div class="game-container">
            <div class="tetris-grid" id="tetris-grid"></div>
            <div class="tetris-preview">
                <h3>Next:</h3>
                <div class="preview-grid" id="preview-grid"></div>
            </div>
        </div>
        <div class="game-status" id="game-status">Use Arrow Keys to Play</div>
        <div class="controls">
            <button id="reset-btn">Reset Game</button>
            <button id="home-btn">Home</button>
        </div>
    </div>
    <script src="script_tetris.js"></script>
</body>
</html>
